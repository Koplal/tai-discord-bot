name: Test

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  test:
    name: Unit Tests + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        # RUN_INTEGRATION_TESTS is intentionally NOT set here.
        # Integration tests (T29, T30) hit real Anthropic APIs and are skipped
        # by default. Run them locally with:
        #   RUN_INTEGRATION_TESTS=1 ANTHROPIC_API_KEY=<key> npm run test:integration

      - name: Build
        run: npm run build
